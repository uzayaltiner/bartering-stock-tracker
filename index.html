<!DOCTYPE html>
<html lang="tr" data-theme="dark" data-lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BDO Bartering Stock Tracking Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (function() {
      var t = localStorage.getItem('bdo-theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
      var l = localStorage.getItem('bdo-lang');
      if (l) document.documentElement.setAttribute('data-lang', l);
      if ((t && t !== 'dark') || (l && l !== 'tr')) {
        document.documentElement.classList.add('app-loading');
      }
    })();
  </script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- Sticky Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <circle cx="12" cy="12" r="2"/>
        <line x1="12" y1="3" x2="12" y2="7"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
        <line x1="3" y1="12" x2="7" y2="12"/>
        <line x1="17" y1="12" x2="21" y2="12"/>
        <line x1="5.6" y1="5.6" x2="8.5" y2="8.5"/>
        <line x1="15.5" y1="15.5" x2="18.4" y2="18.4"/>
        <line x1="5.6" y1="18.4" x2="8.5" y2="15.5"/>
        <line x1="15.5" y1="8.5" x2="18.4" y2="5.6"/>
      </svg>
      <span>BDO Bartering Stock Tracking Tool</span>
    </div>
    <div class="navbar-controls">
      <div class="settings-dropdown">
        <button id="settingsBtn" class="settings-trigger" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div id="settingsMenu" class="settings-panel hidden">
          <div class="settings-panel-accent"></div>

          <!-- Theme -->
          <div class="settings-row">
            <div class="settings-row-left">
              <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
              <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
              <span data-i18n="menuTheme">Tema</span>
            </div>
            <button id="themeToggle" class="theme-switch" aria-label="Toggle theme">
              <span class="theme-switch-thumb"></span>
            </button>
          </div>

          <!-- Language -->
          <div class="settings-row">
            <div class="settings-row-left">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
              </svg>
              <span data-i18n="menuLang">Dil</span>
            </div>
            <div class="lang-pills" id="langPills">
              <span class="lang-pill-bg" id="langPillBg"></span>
              <button class="lang-pill" data-lang="tr">TR</button>
              <button class="lang-pill" data-lang="en">EN</button>
            </div>
          </div>

          <div class="settings-sep"></div>

          <!-- Export -->
          <button id="exportBtn" class="settings-action">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span data-i18n="menuExport">Dışa Aktar</span>
          </button>

          <!-- Import -->
          <label class="settings-action" id="importBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <span data-i18n="menuImport">İçe Aktar</span>
            <input type="file" id="importFile" accept=".json" hidden>
          </label>

          <div class="settings-sep"></div>

          <!-- Clear -->
          <button id="clearAllBtn" class="settings-action settings-danger">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            <span data-i18n="menuClear">Tümünü Sil</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Toolbar -->
    <div class="toolbar">
      <!-- Row 1: Filters -->
      <div class="toolbar-row">
        <div class="level-filters">
          <button class="level-btn level-card active" data-level="all">
            <span class="level-label" data-i18n="filterAll">All</span>
          </button>
          <button class="level-btn level-card" data-level="1">
            <span class="level-dot" style="background:var(--tier-1)"></span>
            <span class="level-label">T1</span>
            <span class="level-count" id="level1Count">0</span>
          </button>
          <button class="level-btn level-card" data-level="2">
            <span class="level-dot" style="background:var(--tier-2)"></span>
            <span class="level-label">T2</span>
            <span class="level-count" id="level2Count">0</span>
          </button>
          <button class="level-btn level-card" data-level="3">
            <span class="level-dot" style="background:var(--tier-3)"></span>
            <span class="level-label">T3</span>
            <span class="level-count" id="level3Count">0</span>
          </button>
          <button class="level-btn level-card" data-level="4">
            <span class="level-dot" style="background:var(--tier-4)"></span>
            <span class="level-label">T4</span>
            <span class="level-count" id="level4Count">0</span>
          </button>
          <button class="level-btn level-card" data-level="5">
            <span class="level-dot" style="background:var(--tier-5)"></span>
            <span class="level-label">T5</span>
            <span class="level-count" id="level5Count">0</span>
          </button>
        </div>
        <div class="toolbar-right">
          <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="search" placeholder="Ara..." data-i18n-placeholder="searchPlaceholder">
          </div>
          <div class="sort-dropdown">
            <button id="sortBtn" class="btn-sort" aria-label="Sort">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" y1="6" x2="20" y2="6"/>
                <line x1="4" y1="12" x2="14" y2="12"/>
                <line x1="4" y1="18" x2="8" y2="18"/>
              </svg>
            </button>
            <div id="sortMenu" class="sort-menu hidden">
              <button class="sort-option" data-sort="default" data-i18n="sortDefault">Varsayilan</button>
              <button class="sort-option" data-sort="tier-asc" data-i18n="sortTierAsc">Tier ↑</button>
              <button class="sort-option" data-sort="tier-desc" data-i18n="sortTierDesc">Tier ↓</button>
              <button class="sort-option" data-sort="stock-asc" data-i18n="sortStockAsc">Stok ↑</button>
              <button class="sort-option" data-sort="stock-desc" data-i18n="sortStockDesc">Stok ↓</button>
            </div>
          </div>
          <button id="clearFilter" class="btn-clear hidden" data-i18n="clearFilter">Temizle</button>
        </div>
      </div>
    </div>

    <!-- Item Grid -->
    <div id="itemGrid" class="item-grid"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <p data-i18n="emptyState">Aramanızla eşleşen item bulunamadı</p>
    </div>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Uzay Altıner</p>
  </footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
